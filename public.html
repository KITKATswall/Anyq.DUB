<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AnyqDUB | ҚАЗАҚША АНИМЕ</title>
    <style>
        /* ============================================
           НЕОН-ДИЗАЙН + КАЗАХСКИЙ КОЛОРИТ
        ============================================ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Noto Sans', sans-serif;
        }

        :root {
            --kazakh-blue: #00b5e2;
            --kazakh-yellow: #f9d849;
            --kazakh-red: #d32f2f;
            --neon-pink: #ff1a8c;
            --neon-purple: #9900ff;
            --ink-black: #0a0a0f;
        }

        body {
            background: var(--ink-black);
            color: #fff;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ============================================
           КАЗАХСКИЙ ОРНАМЕНТ (ФОН)
        ============================================ */
        .kazakh-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(
                45deg,
                rgba(0, 181, 226, 0.02) 0px,
                rgba(0, 181, 226, 0.02) 20px,
                rgba(249, 216, 73, 0.02) 20px,
                rgba(249, 216, 73, 0.02) 40px
            );
            z-index: -5;
            pointer-events: none;
        }

        /* Японские иероглифы (фон) */
        .kanji-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -4;
            opacity: 0.05;
            font-size: 100px;
            color: var(--neon-pink);
            display: flex;
            flex-wrap: wrap;
            justify-content: space-around;
            align-items: center;
            transform: rotate(-10deg);
            pointer-events: none;
        }

        .kanji-bg span {
            animation: floatKanji 30s infinite alternate;
        }

        @keyframes floatKanji {
            from { transform: translateY(0); }
            to { transform: translateY(-50px); }
        }

        /* ============================================
           НАВИГАЦИЯ
        ============================================ */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 40px;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(20px);
            border-bottom: 3px solid var(--kazakh-blue);
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 0 50px rgba(0,181,226,0.3);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logo-icon {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, var(--kazakh-blue), var(--kazakh-yellow));
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            font-weight: bold;
            color: black;
            transform: rotate(5deg);
            box-shadow: 0 0 40px var(--kazakh-blue);
        }

        .logo-text h1 {
            font-size: 28px;
            background: linear-gradient(135deg, #fff, var(--kazakh-blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .logo-text p {
            font-size: 12px;
            color: var(--kazakh-yellow);
            letter-spacing: 2px;
        }

        /* ============================================
           СЕКРЕТНАЯ АДМИНКА (ВНИЗУ)
        ============================================ */
        .admin-secret {
            position: fixed;
            bottom: 20px;
            right: 20px;
            font-size: 12px;
            color: rgba(255,255,255,0.15);
            cursor: pointer;
            z-index: 1000;
            writing-mode: vertical-rl;
            text-orientation: upright;
            background: rgba(0,0,0,0.3);
            padding: 10px 5px;
            border-radius: 30px;
            backdrop-filter: blur(5px);
            transition: all 0.3s;
            border: 1px solid rgba(0,181,226,0.1);
        }

        .admin-secret:hover {
            color: var(--kazakh-blue);
            background: rgba(0,0,0,0.7);
            border-color: var(--kazakh-blue);
            text-shadow: 0 0 20px var(--kazakh-blue);
        }

        /* ============================================
           ГЕРОЙ СЕКЦИЯ
        ============================================ */
        .hero {
            text-align: center;
            padding: 80px 30px;
            position: relative;
        }

        .hero h2 {
            font-size: clamp(40px, 10vw, 80px);
            font-weight: 900;
            margin-bottom: 20px;
            line-height: 1.2;
        }

        .hero .kk {
            color: #fff;
            text-shadow: 0 0 20px var(--kazakh-blue), 0 0 40px var(--kazakh-yellow);
        }

        .hero .jp {
            font-size: 20px;
            color: rgba(255,255,255,0.5);
            letter-spacing: 10px;
            margin-top: 10px;
        }

        .hero-desc {
            max-width: 800px;
            margin: 0 auto;
            padding: 30px;
            background: rgba(0,20,30,0.4);
            backdrop-filter: blur(10px);
            border-radius: 100px;
            border: 2px solid var(--kazakh-blue);
            color: #ddd;
            font-size: 18px;
            line-height: 1.8;
        }

        /* ============================================
           ЖАНРЛАР
        ============================================ */
        .genres {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            justify-content: center;
            padding: 20px;
            margin: 30px 0;
        }

        .genre {
            padding: 12px 30px;
            background: rgba(0,181,226,0.1);
            border: 2px solid var(--kazakh-blue);
            border-radius: 50px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 14px;
        }

        .genre:hover {
            background: var(--kazakh-blue);
            transform: translateY(-5px);
            box-shadow: 0 0 40px var(--kazakh-blue);
            color: black;
        }

        /* ============================================
           ГРИД АНИМЕ
        ============================================ */
        .anime-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 40px;
            padding: 40px;
            max-width: 1400px;
            margin: 0 auto;
        }

        /* КАРТОЧКА АНИМЕ */
        .anime-card {
            background: rgba(10,10,20,0.8);
            backdrop-filter: blur(15px);
            border: 3px solid var(--kazakh-blue);
            border-radius: 40px;
            overflow: hidden;
            transition: all 0.4s;
            cursor: pointer;
            position: relative;
            box-shadow: 0 20px 40px rgba(0,0,0,0.8);
        }

        .anime-card::before {
            content: "⚡";
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 30px;
            color: var(--kazakh-yellow);
            z-index: 3;
            text-shadow: 0 0 30px gold;
            opacity: 0.5;
        }

        .anime-card:hover {
            transform: translateY(-20px);
            border-color: var(--kazakh-yellow);
            box-shadow: 0 0 70px rgba(0,181,226,0.5);
        }

        .anime-poster {
            width: 100%;
            aspect-ratio: 2/3;
            object-fit: cover;
            transition: 0.5s;
            border-bottom: 3px solid var(--kazakh-blue);
        }

        .anime-card:hover .anime-poster {
            transform: scale(1.05);
            filter: brightness(1.1) saturate(1.2);
        }

        .anime-info {
            padding: 25px;
        }

        .anime-title {
            font-size: 24px;
            font-weight: 900;
            color: #fff;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .anime-title::before {
            content: "⚔️";
            color: var(--kazakh-yellow);
        }

        .anime-desc {
            color: #bbb;
            font-size: 14px;
            line-height: 1.6;
            margin-bottom: 20px;
        }

        /* КНОПКА СЕРИЙ */
        .episodes-btn {
            background: transparent;
            border: 2px solid var(--kazakh-blue);
            color: white;
            padding: 12px 20px;
            border-radius: 40px;
            width: 100%;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .episodes-btn:hover {
            background: var(--kazakh-blue);
            color: black;
            box-shadow: 0 0 50px var(--kazakh-blue);
        }

        /* КОНТЕЙНЕР СЕРИЙ */
        .episodes-container {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.5s ease;
            margin-top: 15px;
            border-radius: 30px;
            background: rgba(0,0,0,0.5);
        }

        .anime-card.expanded .episodes-container {
            max-height: 400px;
            overflow-y: auto;
        }

        .episode-item {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 15px 20px;
            border-bottom: 1px solid rgba(0,181,226,0.2);
            cursor: pointer;
            transition: 0.3s;
        }

        .episode-item:hover {
            background: rgba(0,181,226,0.2);
            padding-left: 30px;
        }

        .episode-number {
            background: var(--kazakh-blue);
            color: black;
            width: 35px;
            height: 35px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            font-weight: bold;
        }

        .episode-title {
            flex: 1;
            color: white;
        }

        .episode-play {
            color: var(--kazakh-yellow);
            font-size: 20px;
        }

        /* ============================================
           ПЛЕЕР
        ============================================ */
        .player-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.98);
            z-index: 10000;
            display: none;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(30px);
        }

        .player-container {
            width: 95%;
            max-width: 1200px;
            position: relative;
        }

        .player-frame {
            background: linear-gradient(135deg, var(--kazakh-blue), var(--kazakh-yellow));
            padding: 5px;
            border-radius: 60px;
            box-shadow: 0 0 150px var(--kazakh-blue);
        }

        .player-content {
            background: black;
            border-radius: 55px;
            overflow: hidden;
            aspect-ratio: 16/9;
        }

        .player-content iframe,
        .player-content video {
            width: 100%;
            height: 100%;
            border: none;
        }

        .close-player {
            position: absolute;
            top: -50px;
            right: 0;
            background: var(--kazakh-blue);
            color: black;
            border: none;
            padding: 15px 30px;
            border-radius: 40px;
            font-weight: bold;
            cursor: pointer;
            font-size: 16px;
            box-shadow: 0 0 50px var(--kazakh-blue);
        }

        /* ============================================
           ФУТЕР
        ============================================ */
        .footer {
            margin-top: 100px;
            padding: 50px;
            background: rgba(0,0,0,0.9);
            border-top: 3px solid var(--kazakh-blue);
            text-align: center;
            position: relative;
        }

        .footer p {
            color: #888;
            font-size: 14px;
            margin: 10px 0;
        }

        .footer .jp {
            color: var(--kazakh-blue);
            font-size: 12px;
            letter-spacing: 5px;
        }

        /* ============================================
           АДАПТАЦИЯ
        ============================================ */
        @media (max-width: 768px) {
            .navbar {
                padding: 15px;
            }
            
            .logo-text h1 {
                font-size: 20px;
            }
            
            .hero-desc {
                padding: 20px;
                font-size: 14px;
            }
            
            .anime-grid {
                grid-template-columns: 1fr;
                padding: 20px;
            }
            
            .admin-secret {
                writing-mode: horizontal-tb;
                bottom: 10px;
                right: 10px;
                padding: 5px 10px;
            }
        }
    </style>
</head>
<body>
    <!-- ============================================
         ФОНОВЫЕ ЭЛЕМЕНТЫ
    ============================================ -->
    <div class="kazakh-bg"></div>
    <div class="kanji-bg">
        <span>魂</span> <span>侍</span> <span>夢</span> <span>愛</span> <span>義</span> <span>心</span>
    </div>

    <!-- ============================================
         СЕКРЕТНЫЙ ВХОД (АДМИНКА)
    ============================================ -->
    <div class="admin-secret" id="adminTrigger">
        管理者<br>КІРУ
    </div>

    <!-- ============================================
         НАВИГАЦИЯ
    ============================================ -->
    <nav class="navbar">
        <div class="logo">
            <div class="logo-icon">A</div>
            <div class="logo-text">
                <h1>AnyqDUB</h1>
                <p>〜 қазақша аниме 〜</p>
            </div>
        </div>
        <div style="color: var(--kazakh-yellow);">#AnyqDUB</div>
    </nav>

    <!-- ============================================
         ГЕРОЙ
    ============================================ -->
    <section class="hero">
        <h2>
            <span class="kk">АНЫҚ ДАУЫС</span><br>
            <span class="jp">〜 本当の声 〜</span>
        </h2>
        <div class="hero-desc">
            AnyqDUB - жапон анимелерін қазақ тілінде, дәлме-дәл аудармамен. 
            Біз әр эмоцияны, әр интонацияны сақтаймыз.
        </div>
    </section>

    <!-- ============================================
         ЖАНРЛАР
    ============================================ -->
    <div class="genres">
        <span class="genre">#Барлығы</span>
        <span class="genre">#Сёнен</span>
        <span class="genre">#Сёдзё</span>
        <span class="genre">#Фэнтези</span>
        <span class="genre">#Экшн</span>
        <span class="genre">#Романтика</span>
    </div>

    <!-- ============================================
         АНИМЕ ГРИД
    ============================================ -->
    <div class="anime-grid" id="animeGrid"></div>

    <!-- ============================================
         ПЛЕЕР
    ============================================ -->
    <div class="player-overlay" id="playerOverlay">
        <div class="player-container">
            <button class="close-player" id="closePlayer">✕ ЖАБУ</button>
            <div class="player-frame">
                <div class="player-content" id="playerContent"></div>
            </div>
        </div>
    </div>

    <!-- ============================================
         ФУТЕР
    ============================================ -->
    <footer class="footer">
        <p>© 2024 AnyqDUB — Қазақша аниме әлемі</p>
        <p class="jp">〜 魂の翻訳 〜</p>
        <p style="font-size: 12px; margin-top: 20px; color: #444;">アニメ 生命</p>
    </footer>

    <script>
        // ============================================
        // ДАННЫЕ (LOCALSTORAGE)
        // ============================================
        let animeList = [];

        // ЖҮКТЕУ
        function loadData() {
            const stored = localStorage.getItem('anyqdub_data');
            if (stored) {
                try {
                    animeList = JSON.parse(stored);
                } catch (e) {
                    animeList = [];
                }
            }
            
            // ТЕСТОВЫЕ ДАННЫЕ
            if (animeList.length === 0) {
                animeList = [
                    {
                        title: "Наруто: Ураганды хроникалар",
                        desc: "Наруто мен Саскенің аңызға айналған оқиғасы. 500+ серия",
                        poster: "https://via.placeholder.com/400x600/00b5e2/ffffff?text=NARUTO",
                        episodes: [
                            { num: 1, title: "Үйге оралу", url: "https://rutube.ru/play/embed/477e88c96a2854e4da349bbb6be92463" },
                            { num: 2, title: "Акацуки бастайды", url: "https://rutube.ru/play/embed/477e88c96a2854e4da349bbb6be92463" },
                            { num: 3, title: "Сакура мен Наруто", url: "https://rutube.ru/play/embed/477e88c96a2854e4da349bbb6be92463" }
                        ]
                    },
                    {
                        title: "Соңғы самурай",
                        desc: "Феодалдық Жапониядағы самурайлардың соңғы күндері",
                        poster: "https://via.placeholder.com/400x600/f9d849/000000?text=SAMURAI",
                        episodes: [
                            { num: 1, title: "Самурай жолы", url: "https://rutube.ru/play/embed/477e88c96a2854e4da349bbb6be92463" },
                            { num: 2, title: "Сегунның бұйрығы", url: "https://rutube.ru/play/embed/477e88c96a2854e4da349bbb6be92463" }
                        ]
                    }
                ];
            }
            
            renderAnime();
        }

        // САҚТАУ
        function saveData() {
            localStorage.setItem('anyqdub_data', JSON.stringify(animeList));
            renderAnime();
        }

        // ============================================
        // АНИМЕ КАРТОЧКАЛАРЫН КӨРСЕТУ
        // ============================================
        function renderAnime() {
            const grid = document.getElementById('animeGrid');
            grid.innerHTML = '';

            animeList.forEach((anime, animeIdx) => {
                const card = document.createElement('div');
                card.className = 'anime-card';
                card.setAttribute('data-index', animeIdx);

                let episodesHTML = '';
                if (anime.episodes && anime.episodes.length > 0) {
                    episodesHTML = '<div class="episodes-container">';
                    anime.episodes.forEach((ep, epIdx) => {
                        episodesHTML += `
                            <div class="episode-item" onclick="playEpisode(${animeIdx}, ${epIdx})">
                                <span class="episode-number">${ep.num}</span>
                                <span class="episode-title">${ep.title}</span>
                                <span class="episode-play">▶</span>
                            </div>
                        `;
                    });
                    episodesHTML += '</div>';
                }

                card.innerHTML = `
                    <img src="${anime.poster}" class="anime-poster" onerror="this.src='https://via.placeholder.com/400x600/00b5e2/ffffff?text=ANIME'">
                    <div class="anime-info">
                        <h3 class="anime-title">${anime.title}</h3>
                        <p class="anime-desc">${anime.desc}</p>
                        <button class="episodes-btn" onclick="toggleEpisodes(this)">
                            <span>📺 СЕРИЯЛАР</span> <span>${anime.episodes?.length || 0}</span>
                        </button>
                        ${episodesHTML}
                    </div>
                `;

                grid.appendChild(card);
            });
        }

        // СЕРИЯЛАРДЫ АШУ/ЖАБУ
        window.toggleEpisodes = function(btn) {
            const card = btn.closest('.anime-card');
            card.classList.toggle('expanded');
            btn.innerHTML = card.classList.contains('expanded') ? 
                '▲ ЖАБУ' : 
                `<span>📺 СЕРИЯЛАР</span> <span>${animeList[card.dataset.index].episodes?.length || 0}</span>`;
        };

        // ============================================
        // ПЛЕЕР
        // ============================================
        window.playEpisode = function(animeIdx, epIdx) {
            const episode = animeList[animeIdx].episodes[epIdx];
            const container = document.getElementById('playerContent');
            const url = episode.url;
            
            container.innerHTML = '';

            // Rutube
            if (url.includes('rutube')) {
                let videoId = url.split('/').pop().split('?')[0];
                container.innerHTML = `<iframe src="https://rutube.ru/play/embed/${videoId}?autoplay=1" allow="autoplay; fullscreen"></iframe>`;
            }
            // YouTube
            else if (url.includes('youtube') || url.includes('youtu.be')) {
                let videoId = '';
                if (url.includes('watch?v=')) videoId = url.split('watch?v=')[1].split('&')[0];
                else if (url.includes('youtu.be/')) videoId = url.split('youtu.be/')[1].split('?')[0];
                container.innerHTML = `<iframe src="https://www.youtube.com/embed/${videoId}?autoplay=1" allow="autoplay; fullscreen"></iframe>`;
            }
            // MP4
            else if (url.includes('.mp4')) {
                container.innerHTML = `<video src="${url}" controls autoplay style="width:100%; height:100%;"></video>`;
            }
            // Басқа
            else {
                container.innerHTML = `<iframe src="${url}" allow="autoplay; fullscreen"></iframe>`;
            }

            document.getElementById('playerOverlay').style.display = 'flex';
        };

        // ПЛЕЕРДЫ ЖАБУ
        document.getElementById('closePlayer').addEventListener('click', function() {
            document.getElementById('playerOverlay').style.display = 'none';
            document.getElementById('playerContent').innerHTML = '';
        });

        // ============================================
        // АДМИНКА (ТОЛЫҒЫМЕН ҚАЗАҚША)
        // ============================================
        const adminTrigger = document.getElementById('adminTrigger');
        let clickCount = 0;
        let clickTimer;

        adminTrigger.addEventListener('click', function() {
            clickCount++;
            
            if (clickTimer) clearTimeout(clickTimer);
            clickTimer = setTimeout(() => { clickCount = 0; }, 2000);
            
            if (clickCount >= 3) {
                clickCount = 0;
                openAdminPanel();
            }
        });

        function openAdminPanel() {
            // ЕСКІ ПАНЕЛЬДІ ӨШІРУ
            const oldPanel = document.getElementById('adminPanel');
            if (oldPanel) oldPanel.remove();

            const panel = document.createElement('div');
            panel.id = 'adminPanel';
            panel.style.cssText = `
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background: rgba(0,0,0,0.98);
                z-index: 20000;
                overflow-y: auto;
                padding: 40px;
                backdrop-filter: blur(20px);
                color: white;
            `;

            panel.innerHTML = `
                <div style="max-width: 1200px; margin: 0 auto;">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; background: #001a24; padding: 30px; border-radius: 60px; border: 3px solid #00b5e2;">
                        <h1 style="color: #00b5e2; font-size: 40px;">⚡ АДМИН ПАНЕЛЬ</h1>
                        <button onclick="closeAdminPanel()" style="background: #d32f2f; border: none; color: white; padding: 15px 40px; border-radius: 50px; font-size: 18px; cursor: pointer; font-weight: bold;">✕ ЖАБУ</button>
                    </div>

                    <!-- ҚОСУ ФОРМАСЫ -->
                    <div style="background: #001f2a; border: 3px solid #00b5e2; border-radius: 60px; padding: 40px; margin-bottom: 50px;">
                        <h2 style="color: #f9d849; margin-bottom: 30px;">➕ ЖАҢА АНИМЕ ҚОСУ</h2>
                        
                        <div style="margin-bottom: 25px;">
                            <label style="color: #00b5e2; display: block; margin-bottom: 10px;">АТАУЫ</label>
                            <input id="adminTitle" style="width: 100%; padding: 15px 20px; background: #002a33; border: 2px solid #00b5e2; border-radius: 40px; color: white; font-size: 16px;" placeholder="Мысалы: Наруто">
                        </div>

                        <div style="margin-bottom: 25px;">
                            <label style="color: #00b5e2; display: block; margin-bottom: 10px;">СИПАТТАМА</label>
                            <textarea id="adminDesc" style="width: 100%; padding: 15px 20px; background: #002a33; border: 2px solid #00b5e2; border-radius: 40px; color: white; font-size: 16px; height: 100px;" placeholder="Аниме туралы қысқаша..."></textarea>
                        </div>

                        <div style="margin-bottom: 25px;">
                            <label style="color: #00b5e2; display: block; margin-bottom: 10px;">ПОСТЕР (URL)</label>
                            <input id="adminPoster" style="width: 100%; padding: 15px 20px; background: #002a33; border: 2px solid #00b5e2; border-radius: 40px; color: white; font-size: 16px;" placeholder="https://...">
                        </div>

                        <div style="margin-bottom: 30px; background: #001a24; padding: 30px; border-radius: 50px;">
                            <h3 style="color: #f9d849; margin-bottom: 20px;">📺 СЕРИЯЛАР</h3>
                            <div id="episodeFields"></div>
                            <button onclick="addEpisodeField()" style="background: transparent; border: 2px dashed #00b5e2; color: #00b5e2; padding: 15px; border-radius: 40px; width: 100%; font-size: 16px; margin: 20px 0; cursor: pointer;">+ ЖАҢА СЕРИЯ ҚОСУ</button>
                        </div>

                        <button onclick="addAnime()" style="background: linear-gradient(135deg, #00b5e2, #f9d849); border: none; color: black; padding: 20px; border-radius: 60px; width: 100%; font-size: 20px; font-weight: bold; cursor: pointer; box-shadow: 0 0 50px #00b5e2;">⚡ АНИМЕ САҚТАУ</button>
                    </div>

                    <!-- АНИМЕ ТІЗІМІ -->
                    <div style="background: #001a24; border: 3px solid #00b5e2; border-radius: 60px; padding: 40px;">
                        <h2 style="color: #f9d849; margin-bottom: 30px;">📚 АНИМЕ ТІЗІМІ</h2>
                        <div id="adminAnimeList"></div>
                    </div>
                </div>
            `;

            document.body.appendChild(panel);
            
            // 1 СЕРИЯ ҚОСУ
            episodeCount = 0;
            addEpisodeField();
            
            // АНИМЕ ТІЗІМІН КӨРСЕТУ
            renderAdminList();
        }

        // АДМИНКАДАҒЫ СЕРИЯЛАР
        let episodeCount = 0;

        window.addEpisodeField = function(num = '', title = '', url = '') {
            const container = document.getElementById('episodeFields');
            const epDiv = document.createElement('div');
            epDiv.style.cssText = `
                display: grid;
                grid-template-columns: 80px 1fr 2fr auto;
                gap: 10px;
                margin-bottom: 15px;
                background: #002a33;
                padding: 15px;
                border-radius: 40px;
                align-items: center;
            `;
            
            epDiv.innerHTML = `
                <input type="number" placeholder="№" class="ep-num" value="${num}" style="padding: 12px; background: #001a24; border: 1px solid #00b5e2; border-radius: 30px; color: white;">
                <input type="text" placeholder="Атауы" class="ep-title" value="${title}" style="padding: 12px; background: #001a24; border: 1px solid #00b5e2; border-radius: 30px; color: white;">
                <input type="url" placeholder="Видео URL" class="ep-url" value="${url}" style="padding: 12px; background: #001a24; border: 1px solid #00b5e2; border-radius: 30px; color: white;">
                <button onclick="this.closest('div').remove()" style="background: #d32f2f; border: none; color: white; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; font-size: 20px;">✕</button>
            `;
            
            container.appendChild(epDiv);
            episodeCount++;
        };

        window.addAnime = function() {
            const title = document.getElementById('adminTitle').value.trim();
            const desc = document.getElementById('adminDesc').value.trim();
            const poster = document.getElementById('adminPoster').value.trim();
            
            if (!title || !desc || !poster) {
                alert('Барлық өрістерді толтыр!');
                return;
            }

            // СЕРИЯЛАРДЫ ЖИНАУ
            const episodes = [];
            document.querySelectorAll('#episodeFields > div').forEach(div => {
                const num = div.querySelector('.ep-num').value;
                const title = div.querySelector('.ep-title').value;
                const url = div.querySelector('.ep-url').value;
                
                if (num && title && url) {
                    episodes.push({
                        num: parseInt(num),
                        title: title,
                        url: url
                    });
                }
            });

            if (episodes.length === 0) {
                alert('Кемінде 1 серия қос!');
                return;
            }

            animeList.push({
                title: title,
                desc: desc,
                poster: poster,
                episodes: episodes
            });

            saveData();
            renderAdminList();
            
            // ФОРМАНЫ ТАЗАЛАУ
            document.getElementById('adminTitle').value = '';
            document.getElementById('adminDesc').value = '';
            document.getElementById('adminPoster').value = '';
            document.getElementById('episodeFields').innerHTML = '';
            addEpisodeField();
        };

        function renderAdminList() {
            const container = document.getElementById('adminAnimeList');
            if (!container) return;

            container.innerHTML = '';

            animeList.forEach((anime, index) => {
                const div = document.createElement('div');
                div.style.cssText = `
                    display: flex;
                    justify-content: space-between;
                    align-items: center;
                    padding: 20px;
                    background: #002a33;
                    border-radius: 50px;
                    margin-bottom: 15px;
                    border: 2px solid #00b5e2;
                `;
                
                div.innerHTML = `
                    <div>
                        <h3 style="color: #f9d849; margin-bottom: 5px;">${anime.title}</h3>
                        <p style="color: #888;">${anime.episodes?.length || 0} серия</p>
                    </div>
                    <div style="display: flex; gap: 15px;">
                        <button onclick="deleteAnime(${index})" style="background: #d32f2f; border: none; color: white; padding: 10px 25px; border-radius: 40px; cursor: pointer; font-weight: bold;">ЖОЮ</button>
                    </div>
                `;
                
                container.appendChild(div);
            });
        }

        window.deleteAnime = function(index) {
            if (confirm('Анимені жойғың келе ме?')) {
                animeList.splice(index, 1);
                saveData();
                renderAdminList();
            }
        };

        window.closeAdminPanel = function() {
            const panel = document.getElementById('adminPanel');
            if (panel) panel.remove();
        };

        // ============================================
        // БАСТАУ
        // ============================================
        loadData();
    </script>
</body>
</html>
